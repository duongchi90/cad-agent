name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  offline-tests:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false

      - name: Set up Python 3.11
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements/windows-py311.lock

      - name: Install Tesseract 5.4.0.20240606
        run: |
          $tesseractUrl = "https://github.com/UB-Mannheim/tesseract/releases/download/v5.4.0.20240606/tesseract-ocr-w64-setup-5.4.0.20240606.exe"
          $tesseractSha256 = "c885fff6998e0608ba4bb8ab51436e1c6775c2bafc2559a19b423e18678b60c9"
          $installerPath = Join-Path $env:RUNNER_TEMP "tesseract-ocr-w64-setup-5.4.0.20240606.exe"
          Invoke-WebRequest -Uri $tesseractUrl -OutFile $installerPath
          $actualSha256 = (Get-FileHash -LiteralPath $installerPath -Algorithm SHA256).Hash
          if ($actualSha256 -ne $tesseractSha256) {
            throw "Tesseract installer SHA-256 mismatch: expected $tesseractSha256, found $actualSha256."
          }
          $installer = Start-Process -FilePath $installerPath -ArgumentList "/S" -Wait -PassThru
          if ($installer.ExitCode -ne 0) {
            throw "Tesseract installer failed with exit code $($installer.ExitCode)."
          }

      - name: Bootstrap locked environment
        run: .\scripts\bootstrap.ps1 -PythonExe python

      - name: Run authoritative verification
        run: .\scripts\verify.ps1

      - name: Upload test evidence
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: windows-py311-test-results
          path: .artifacts/test-results/
          if-no-files-found: error
